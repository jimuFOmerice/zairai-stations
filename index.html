<!DOCTYPE html>
<html>
<head>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      gap: 40px;
    }

    h1 {
      color: #ffffff;
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.1em;
    }

    /* --- 駅名標 --- */
    .board-wrapper {
      width: 100%;
      max-width: 900px;
      min-width: 600px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    /* JR style */
    .board {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      user-select: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    }

    .board.jr {
      background: #1a7a3c;
      border: 6px solid #1a7a3c;
      outline: 3px solid #ffffff40;
    }

    /* 上部ライン（JR style白帯） */
    .board.jr .top-bar,
    .board.toei .top-bar {
      background: #ffffff;
      height: 6px;
    }

    /* メイン行 */
    .board-main {
      display: flex;
      align-items: stretch;
      padding: 18px 20px;
      gap: 12px;
    }

    /* 隣駅エリア */
    .neighbor {
      flex: 0 0 22%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 4px;
    }

    .neighbor-label {
      color: #ffffffaa;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
    }

    .neighbor-arrow {
      color: #ffffffcc;
      font-size: 1.1rem;
      line-height: 1;
    }

    .neighbor-name {
      color: #ffffff;
      font-size: clamp(0.9rem, 2.5vw, 1.25rem);
      font-weight: 500;
      text-align: center;
      line-height: 1.3;
    }

    .neighbor-ruby {
      color: #ffffffbb;
      font-size: clamp(0.6rem, 1.5vw, 0.8rem);
      text-align: center;
    }

    /* 区切り線 */
    .divider {
      width: 2px;
      background: #ffffff40;
      border-radius: 1px;
      flex-shrink: 0;
    }

    /* 中央駅名エリア */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 8px 0;
    }

    .station-ruby {
      color: #ffffffcc;
      font-size: clamp(0.75rem, 2vw, 1rem);
      letter-spacing: 0.25em;
    }

    .station-name {
      color: #ffffff;
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      font-weight: 700;
      letter-spacing: 0.05em;
      line-height: 1.1;
      text-align: center;
    }

    .station-romaji {
      color: #ffffffcc;
      font-size: clamp(0.75rem, 2vw, 1.1rem);
      letter-spacing: 0.18em;
    }

    /* 下部ライン */
    .board .bottom-bar {
      background: #ffffff;
      height: 6px;
    }

    .board.metro .bottom-bar,
    .board.hankyu .bottom-bar {
      background: #ffffff30;
      height: 4px;
    }

</style>
<script src="https://unpkg.com/vue"></script>
<script src="position.js"></script>
<script src="station.js"></script>
<script type="text/javascript">
	function nyaan(){
		const nyaan={
			data(){
				return{
					message: 'Nyaan2',
					isDisplay: false
				}
			},
			methods:{
				success(pos){
					this.message="計算中...";
					const crd=pos.coords;
					let location='{"latitude":'+pos.coords.latitude+',"longitude":'+pos.coords.longitude+'}'
					let now=JSON.parse(location);
					let dic=JSON.parse(Stations);
					let minimum=Number.MAX_VALUE;
					let nearest;
					for(station of dic.Stations){
						distance=getDistance(now,station);
						if(distance<minimum){
							minimum=distance;
							nearest=station;
						}
					}
					this.message=nearest.name;
					this.next=nearest.next;
					this,prev=nearest.prev;
					this.distance="("+Math.round(minimum*10)/10+"km)";
					this.isDisplay=true;
				},
				fail(pos){
					this.message="エラーが発生しました。";
					console.log("failed:"+pos.code);
				},
				getNearestStation(){
					const options = {
						  enableHighAccuracy: false,
						  timeout: 5000,
						  maximumAge: 5000,
						};
					console.log("nyaaan");
					this.message="位置情報取得中...";
					navigator.geolocation.getCurrentPosition(this.success,this.fail,options);
				}
			}
		}
		
		Vue.createApp(nyaan).mount('#nyaanx');
	}
</script>
</head>
<body onload="javascript:nyaan();">
<!--<div id="nyaanx">-->
<div id="nyaanx">
<div :style="{display : isDisplay ? 'block':'none'}" id="board">
<div class="board-wrapper">
  <div class="board jr" id="board">
    <div class="top-bar"></div>
    <div class="board-main">
      <div class="neighbor" id="prev-area">
        <div class="neighbor-label">←</div>
        <div class="neighbor-name empty-text" id="prev-name-disp"><span v-text="next"></span> </div>
        <div class="neighbor-ruby" id="prev-ruby-disp"></div>
        <div class="neighbor-ruby" id="prev-en-disp"></div>
      </div>
      <div class="divider"></div>
      <div class="center">
        <div class="station-ruby" id="curr-ruby-disp"></div>
        <div class="station-name" id="curr-name-disp"><span v-text="message"></span> </div>
        <div class="station-romaji" id="curr-en-disp"><span v-text="distance"></span></div>
      </div>
      <div class="divider"></div>
      <div class="neighbor" id="next-area">
        <div class="neighbor-label">→</div>
        <div class="neighbor-name empty-text" id="next-name-disp"><span v-text="prev"></span> </div>
        <div class="neighbor-ruby" id="next-ruby-disp"></div>
        <div class="neighbor-ruby" id="next-en-disp"></div>
      </div>
    </div>
    <div class="bottom-bar"></div>
  </div>
</div>
</div>
<button @click="getNearestStation">nyaan</button>
</div>
</body>
</html>
